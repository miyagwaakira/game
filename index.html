<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Orb Cascade</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fbff;
      --muted: #aab7c6;
      --line: rgba(255, 255, 255, .14);
      --panel: rgba(12, 18, 28, .74);
      --accent: #ffd166;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }

    body {
      overflow: hidden;
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 209, 102, .18), transparent 28%),
        radial-gradient(circle at 78% 30%, rgba(87, 197, 182, .17), transparent 30%),
        linear-gradient(145deg, #10151d, #252029 46%, #10191e);
    }

    button { font: inherit; }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 270px;
      width: 100vw;
      height: 100vh;
    }

    .stage { position: relative; min-width: 0; }

    #scene {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }

    #scene:active { cursor: grabbing; }

    .hud {
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      pointer-events: none;
    }

    .brand, .stats, .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 20px 70px rgba(0, 0, 0, .25);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 8px;
    }

    .mark {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: conic-gradient(#ff5c7a, #ffd166, #6ee7b7, #60a5fa, #c084fc, #ff5c7a);
      box-shadow: inset -8px -10px 14px rgba(0, 0, 0, .3), 0 0 22px rgba(255, 209, 102, .25);
    }

    .brand p, .brand strong, .stats small { margin: 0; }
    .brand p, .stats small { color: var(--muted); font-size: 12px; }
    .brand strong { display: block; margin-top: 2px; font-size: 15px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(74px, 1fr));
      min-width: 280px;
      border-radius: 8px;
      overflow: hidden;
    }

    .stats div {
      padding: 10px 12px;
      border-left: 1px solid var(--line);
      text-align: right;
    }

    .stats div:first-child { border-left: 0; }
    .stats span { display: block; font-size: 24px; font-weight: 800; line-height: 1; }

    .burst {
      position: absolute;
      left: 50%;
      top: 50%;
      min-width: 160px;
      transform: translate(-50%, -50%) scale(.9);
      text-align: center;
      font-size: 46px;
      font-weight: 900;
      color: #fff8d8;
      opacity: 0;
      pointer-events: none;
      text-shadow: 0 8px 28px rgba(255, 168, 59, .6);
      transition: opacity .2s ease, transform .2s ease;
    }

    .burst.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 20px;
      border-width: 0 0 0 1px;
    }

    .team {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .leader {
      display: grid;
      place-items: center;
      gap: 6px;
      min-height: 74px;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .06);
      cursor: pointer;
    }

    .leader span {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      box-shadow: inset -6px -8px 10px rgba(0, 0, 0, .3);
    }

    .leader[data-skill="fire"] span { background: #ff4f6d; }
    .leader[data-skill="water"] span { background: #42a5ff; }
    .leader[data-skill="wood"] span { background: #54d17a; }

    .leader.active {
      border-color: rgba(255, 209, 102, .8);
      box-shadow: 0 0 0 2px rgba(255, 209, 102, .18);
    }

    .meter {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    progress {
      width: 100%;
      height: 16px;
      overflow: hidden;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, .1);
    }

    progress::-webkit-progress-bar { background: rgba(255, 255, 255, .1); }
    progress::-webkit-progress-value { background: linear-gradient(90deg, #72d39c, #ffd166); }

    .primary, .ghost {
      min-height: 46px;
      border-radius: 8px;
      cursor: pointer;
    }

    .primary {
      color: #201408;
      border: 0;
      background: var(--accent);
      font-weight: 800;
    }

    .ghost {
      color: var(--ink);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .05);
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) auto;
      }

      .panel {
        display: grid;
        grid-template-columns: 1fr 1fr;
        border-width: 1px 0 0;
        padding: 12px;
      }

      .team, .meter { grid-column: 1 / -1; }

      .hud {
        flex-direction: column;
        align-items: stretch;
        top: 10px;
        left: 10px;
        right: 10px;
      }

      .stats { min-width: 0; }
      .stats span { font-size: 20px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage" aria-label="3Dパズル盤面">
      <canvas id="scene"></canvas>
      <div class="hud">
        <div class="brand">
          <span class="mark"></span>
          <div>
            <p>3D Orb Cascade</p>
            <strong>ドラッグでコンボ</strong>
          </div>
        </div>
        <div class="stats">
          <div><span id="score">0</span><small>Score</small></div>
          <div><span id="combo">0</span><small>Combo</small></div>
          <div><span id="time">60</span><small>Time</small></div>
        </div>
      </div>
      <div id="burst" class="burst" aria-live="polite"></div>
    </section>
    <aside class="panel">
      <div class="team">
        <button class="leader active" data-skill="fire" title="火力を少し上げる"><span></span>火</button>
        <button class="leader" data-skill="water" title="回復を得点に変える"><span></span>水</button>
        <button class="leader" data-skill="wood" title="木コンボの加点"><span></span>木</button>
      </div>
      <div class="meter">
        <label for="hp">HP</label>
        <progress id="hp" max="100" value="100"></progress>
      </div>
      <button id="start" class="primary">スタート</button>
      <button id="reset" class="ghost">リセット</button>
    </aside>
  </main>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.164.1/build/three.module.js";

    const COLS = 6;
    const ROWS = 5;
    const TYPES = [
      { id: "fire", color: 0xff4f6d, glow: 0xff9b6a },
      { id: "water", color: 0x42a5ff, glow: 0x7dd3fc },
      { id: "wood", color: 0x54d17a, glow: 0xb7f7a8 },
      { id: "light", color: 0xffdd70, glow: 0xffffff },
      { id: "dark", color: 0xa78bfa, glow: 0xe9d5ff },
      { id: "heart", color: 0xff73b8, glow: 0xffd1e8 }
    ];

    const canvas = document.querySelector("#scene");
    const scoreEl = document.querySelector("#score");
    const comboEl = document.querySelector("#combo");
    const timeEl = document.querySelector("#time");
    const hpEl = document.querySelector("#hp");
    const burstEl = document.querySelector("#burst");
    const startBtn = document.querySelector("#start");
    const resetBtn = document.querySelector("#reset");
    const leaderBtns = [...document.querySelectorAll(".leader")];

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x111822, 12, 26);

    const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
    camera.position.set(0, 5.7, 9.8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    const group = new THREE.Group();
    const particles = new THREE.Group();
    scene.add(group, particles);

    const ambient = new THREE.HemisphereLight(0xffffff, 0x263340, 1.45);
    scene.add(ambient);

    const key = new THREE.DirectionalLight(0xffffff, 2.4);
    key.position.set(-3, 7, 4);
    key.castShadow = true;
    scene.add(key);

    const rim = new THREE.PointLight(0x78fff1, 24, 12);
    rim.position.set(4, 3, -3);
    scene.add(rim);

    const tileGeo = new THREE.BoxGeometry(1.02, .14, 1.02);
    const orbGeo = new THREE.SphereGeometry(.39, 36, 24);
    const materials = new Map();

    let selected = null;
    let held = null;
    let score = 0;
    let combo = 0;
    let hp = 100;
    let time = 60;
    let playing = false;
    let resolving = false;
    let activeLeader = "fire";
    let timerId = null;
    let last = performance.now();

    function cellToWorld(row, col) {
      return {
        x: (col - (COLS - 1) / 2) * 1.08,
        y: .18,
        z: (row - (ROWS - 1) / 2) * 1.08
      };
    }

    function makeOrb(typeIndex, row, col) {
      const type = TYPES[typeIndex];
      if (!materials.has(type.id)) {
        materials.set(type.id, new THREE.MeshStandardMaterial({
          color: type.color,
          roughness: .32,
          metalness: .08,
          emissive: type.glow,
          emissiveIntensity: .16
        }));
      }
      const mesh = new THREE.Mesh(orbGeo, materials.get(type.id));
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData = { row, col, type: typeIndex, target: cellToWorld(row, col), pulse: Math.random() * 10 };
      mesh.position.copy(mesh.userData.target);
      return mesh;
    }

    function randomType() {
      return Math.floor(Math.random() * TYPES.length);
    }

    function buildBoard() {
      group.clear();
      for (let row = 0; row < ROWS; row += 1) {
        for (let col = 0; col < COLS; col += 1) {
          const tile = new THREE.Mesh(tileGeo, new THREE.MeshStandardMaterial({
            color: (row + col) % 2 ? 0x29313b : 0x202832,
            roughness: .85,
            metalness: .05
          }));
          const cell = cellToWorld(row, col);
          tile.position.set(cell.x, -.16, cell.z);
          tile.receiveShadow = true;
          group.add(tile);
          let type = randomType();
          while ((col > 1 && board[row][col - 1]?.userData.type === type && board[row][col - 2]?.userData.type === type) ||
            (row > 1 && board[row - 1][col]?.userData.type === type && board[row - 2][col]?.userData.type === type)) {
            type = randomType();
          }
          const orb = makeOrb(type, row, col);
          board[row][col] = orb;
          group.add(orb);
        }
      }
    }

    function resize() {
      const { clientWidth, clientHeight } = canvas;
      renderer.setSize(clientWidth, clientHeight, false);
      camera.aspect = clientWidth / clientHeight;
      const compact = camera.aspect < .78;
      group.scale.setScalar(compact ? .78 : 1);
      camera.position.set(0, compact ? 6.4 : 5.7, compact ? 12.8 : 9.8);
      camera.fov = compact ? 48 : 42;
      camera.lookAt(0, 0, 0);
      camera.updateProjectionMatrix();
    }

    function setPointer(event) {
      const rect = canvas.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -(((event.clientY - rect.top) / rect.height) * 2 - 1);
    }

    function pickOrb(event) {
      setPointer(event);
      raycaster.setFromCamera(pointer, camera);
      return raycaster.intersectObjects(board.flat().filter(Boolean), false)[0]?.object ?? null;
    }

    function swap(a, b) {
      const ar = a.userData.row;
      const ac = a.userData.col;
      const br = b.userData.row;
      const bc = b.userData.col;
      board[ar][ac] = b;
      board[br][bc] = a;
      Object.assign(a.userData, { row: br, col: bc, target: cellToWorld(br, bc) });
      Object.assign(b.userData, { row: ar, col: ac, target: cellToWorld(ar, ac) });
    }

    function areNeighbors(a, b) {
      return Math.abs(a.userData.row - b.userData.row) + Math.abs(a.userData.col - b.userData.col) === 1;
    }

    function findMatches() {
      const found = new Set();
      for (let row = 0; row < ROWS; row += 1) {
        let run = [board[row][0]];
        for (let col = 1; col <= COLS; col += 1) {
          const current = board[row][col];
          const prev = run[0];
          if (current && prev && current.userData.type === prev.userData.type) run.push(current);
          else {
            if (run.length >= 3) run.forEach((orb) => found.add(orb));
            run = [current];
          }
        }
      }
      for (let col = 0; col < COLS; col += 1) {
        let run = [board[0][col]];
        for (let row = 1; row <= ROWS; row += 1) {
          const current = board[row]?.[col];
          const prev = run[0];
          if (current && prev && current.userData.type === prev.userData.type) run.push(current);
          else {
            if (run.length >= 3) run.forEach((orb) => found.add(orb));
            run = [current];
          }
        }
      }
      return [...found];
    }

    function spark(position, color) {
      const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: .95 });
      for (let i = 0; i < 10; i += 1) {
        const bit = new THREE.Mesh(new THREE.SphereGeometry(.045, 10, 8), mat.clone());
        bit.position.copy(position);
        bit.userData.velocity = new THREE.Vector3(
          (Math.random() - .5) * .08,
          Math.random() * .1 + .04,
          (Math.random() - .5) * .08
        );
        bit.userData.life = 1;
        particles.add(bit);
      }
    }

    async function resolveBoard() {
      if (resolving) return;
      resolving = true;
      let chain = 0;
      let matches = findMatches();
      while (matches.length) {
        chain += 1;
        combo = chain;
        const leaderBonus = matches.some((orb) => TYPES[orb.userData.type].id === activeLeader) ? 1.35 : 1;
        score += Math.round(matches.length * chain * 120 * leaderBonus);
        hp = Math.min(100, hp + matches.filter((orb) => TYPES[orb.userData.type].id === "heart").length * 4);
        updateUi();
        burst(`${chain} Combo`);
        matches.forEach((orb) => {
          spark(orb.position, TYPES[orb.userData.type].glow);
          group.remove(orb);
          board[orb.userData.row][orb.userData.col] = null;
        });
        await wait(260);
        collapse();
        await wait(360);
        matches = findMatches();
      }
      resolving = false;
    }

    function collapse() {
      for (let col = 0; col < COLS; col += 1) {
        const stack = [];
        for (let row = ROWS - 1; row >= 0; row -= 1) {
          if (board[row][col]) stack.push(board[row][col]);
        }
        for (let row = ROWS - 1; row >= 0; row -= 1) {
          const orb = stack.shift() ?? makeOrb(randomType(), -2 - Math.random() * 2, col);
          board[row][col] = orb;
          if (!group.children.includes(orb)) group.add(orb);
          Object.assign(orb.userData, { row, col, target: cellToWorld(row, col) });
        }
      }
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function burst(text) {
      burstEl.textContent = text;
      burstEl.classList.add("show");
      window.clearTimeout(burstEl.hideTimer);
      burstEl.hideTimer = window.setTimeout(() => burstEl.classList.remove("show"), 480);
    }

    function updateUi() {
      scoreEl.textContent = score.toLocaleString("ja-JP");
      comboEl.textContent = combo;
      timeEl.textContent = time;
      hpEl.value = hp;
    }

    function resetGame() {
      window.clearInterval(timerId);
      selected = null;
      held = null;
      score = 0;
      combo = 0;
      hp = 100;
      time = 60;
      playing = false;
      resolving = false;
      buildBoard();
      updateUi();
      startBtn.textContent = "スタート";
    }

    function startGame() {
      if (playing) return;
      playing = true;
      startBtn.textContent = "プレイ中";
      burst("Ready");
      timerId = window.setInterval(() => {
        time -= 1;
        hp = Math.max(0, hp - 1);
        updateUi();
        if (time <= 0 || hp <= 0) {
          playing = false;
          window.clearInterval(timerId);
          burst("Finish");
          startBtn.textContent = "もう一度";
        }
      }, 1000);
    }

    canvas.addEventListener("pointerdown", (event) => {
      if (!playing || resolving) return;
      selected = pickOrb(event);
      held = selected;
      if (held) canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!held || resolving) return;
      const target = pickOrb(event);
      if (target && target !== held && areNeighbors(held, target)) swap(held, target);
    });

    canvas.addEventListener("pointerup", async () => {
      if (!held || resolving) return;
      held = null;
      selected = null;
      combo = 0;
      await resolveBoard();
      updateUi();
    });

    startBtn.addEventListener("click", () => {
      if (time <= 0 || hp <= 0) resetGame();
      startGame();
    });

    resetBtn.addEventListener("click", resetGame);

    leaderBtns.forEach((button) => {
      button.addEventListener("click", () => {
        leaderBtns.forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        activeLeader = button.dataset.skill;
      });
    });

    function animate(now) {
      const dt = Math.min(.04, (now - last) / 1000);
      last = now;
      group.rotation.y = Math.sin(now * .00025) * .08;
      board.flat().filter(Boolean).forEach((orb) => {
        orb.userData.pulse += dt * 2;
        orb.position.lerp(orb.userData.target, .18);
        orb.position.y = orb.userData.target.y + Math.sin(orb.userData.pulse) * .035 + (orb === held ? .42 : 0);
        orb.scale.setScalar(orb === held ? 1.16 : 1);
      });
      [...particles.children].forEach((bit) => {
        bit.userData.life -= dt * 1.8;
        bit.position.add(bit.userData.velocity);
        bit.userData.velocity.y -= dt * .12;
        bit.material.opacity = Math.max(0, bit.userData.life);
        if (bit.userData.life <= 0) particles.remove(bit);
      });
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", resize);
    resize();
    resetGame();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
