<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Orb Cascade</title>
  <link rel="stylesheet" href="./styles.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <main class="app">
    <section class="stage" aria-label="3Dパズル盤面">
      <canvas id="scene"></canvas>
      <div class="hud">
        <div class="brand">
          <span class="mark"></span>
          <div>
            <p>3D Orb Cascade</p>
            <strong>ドラッグでコンボ</strong>
          </div>
        </div>
        <div class="stats">
          <div><span id="score">0</span><small>Score</small></div>
          <div><span id="combo">0</span><small>Combo</small></div>
          <div><span id="time">60</span><small>Time</small></div>
        </div>
      </div>
      <div id="burst" class="burst" aria-live="polite"></div>
    </section>
    <aside class="panel">
      <div class="team">
        <button class="leader active" data-skill="fire" title="火力を少し上げる"><span></span>火</button>
        <button class="leader" data-skill="water" title="回復を得点に変える"><span></span>水</button>
        <button class="leader" data-skill="wood" title="木コンボの加点"><span></span>木</button>
      </div>
      <div class="meter">
        <label for="hp">HP</label>
        <progress id="hp" max="100" value="100"></progress>
      </div>
      <button id="start" class="primary">スタート</button>
      <button id="reset" class="ghost">リセット</button>
    </aside>
  </main>
  <script type="module" src="./game.js"></script>
</body>
</html>
